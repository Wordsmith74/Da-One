name: Discover OddsPapi Book Coverage (WNBA)

# One-off manual workflow -- answers "which bookmakers does OddsPapi
# actually return for real WNBA fixtures, and how consistently" so
# core/devig.py's weight tables can be scoped from measured data instead of
# guessed. Requires the ODDSPAPI_API_KEY repo secret to already be set.
# Delete this workflow (and discover_book_coverage.py) once the weighting
# decision is made -- it's not part of the daily pipeline.

on:
  workflow_dispatch:

jobs:
  discover-book-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run book coverage discovery
        env:
          ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
        run: |
          if [ -z "$ODDSPAPI_API_KEY" ]; then
            echo "::error::ODDSPAPI_API_KEY secret is not set (Settings -> Secrets and variables -> Actions)."
            exit 1
          fi
          python3 discover_book_coverage.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oddspapi-book-coverage
          path: book_coverage_report.json
          retention-days: 7
          if-no-files-found: warn
