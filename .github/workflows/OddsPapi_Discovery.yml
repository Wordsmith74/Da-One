name: OddsPapi Discovery
on: [workflow_dispatch]

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Run Discovery with Python
        env:
          API_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: |
          mkdir -p output
          python3 -c "
import requests
import json
import os

key = os.getenv('API_KEY')
headers = {'x-api-key': key}
try:
    response = requests.get('https://api.oddspapi.com/v4/sports', headers=headers)
    response.raise_for_status()
    with open('output/sports.json', 'w') as f:
        json.dump(response.json(), f)
    print('Successfully fetched sports data.')
except Exception as e:
    print(f'Error: {e}')
"

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results
          path: output/
          
