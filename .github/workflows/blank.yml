name: Generate Daily Picks

on:
  schedule:
    # Runs at 10:00 UTC daily (~6am ET / 3am PT) -- adjust to whenever you want
    # the slate refreshed. Cron is always UTC regardless of your local timezone.
    - cron: '0 10 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Clear Python cache
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Run pipeline
        env:
          BALL_DONT_LIE_KEY: ${{ secrets.BALL_DONT_LIE_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          PROP_LINE_API_KEY: ${{ secrets.PROP_LINE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 run_pipeline.py

      - name: Upload run log as artifact (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: output/run_log.json
          retention-days: 14
          if-no-files-found: warn

      - name: Reconcile pick_history.jsonl with origin before committing
        if: always()
        run: |
          git fetch origin main
          python3 - <<'PYEOF'
          import json, os, subprocess

          path = "output/pick_history.jsonl"
          local = []
          if os.path.exists(path):
              with open(path) as f:
                  local = [json.loads(l) for l in f if l.strip()]

          # Pull whatever pick_history.jsonl looked like on origin/main right
          # now -- this may include rows from a concurrent run that landed
          # after this run's checkout but before this push. `git show` returns
          # nonzero if the file didn't exist on that ref yet (e.g. very first
          # run ever), which is fine -- just treat that as "no remote rows".
          remote_raw = subprocess.run(
              ["git", "show", "origin/main:" + path],
              capture_output=True, text=True
          )
          remote = []
          if remote_raw.returncode == 0:
              remote = [json.loads(l) for l in remote_raw.stdout.splitlines() if l.strip()]

          # Union by pick_id (each row gets a fresh uuid4 in cache_history.py,
          # so collisions are not expected, but dedupe defensively anyway) --
          # remote rows this run never saw locally are appended back in rather
          # than silently dropped, then everything is sorted by generated_at
          # so the file stays chronological.
          by_id = {r["pick_id"]: r for r in remote}
          by_id.update({r["pick_id"]: r for r in local})
          merged = sorted(by_id.values(), key=lambda r: r.get("generated_at") or "")

          with open(path, "w") as f:
              for r in merged:
                  f.write(json.dumps(r) + "\n")

          print(f"pick_history.jsonl reconciled: {len(local)} local + {len(remote)} remote -> {len(merged)} merged rows")
          PYEOF

      - name: Commit updated picks.json and run_log.json
        if: always()
        run: |
          git config user.name "picks-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f output/picks.json output/player_id_cache.json output/pick_history.jsonl output/run_log.json
          git diff --quiet --cached || git commit -m "Update picks $(date -u +%Y-%m-%d)"
          # picks.json and run_log.json are fully regenerated every run, so
          # there's nothing meaningful to splice together on a conflict --
          # always keep this run's version. pick_history.jsonl was already
          # reconciled with origin in the previous step, so this is safe for
          # it too. (data/results.db is untracked now -- see .gitignore -- so
          # it can no longer cause a binary-file merge conflict here.)
          git merge -X ours origin/main --no-edit --allow-unrelated-histories
          git push

  deploy-pages:
    needs: generate-picks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (post-commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4


        
