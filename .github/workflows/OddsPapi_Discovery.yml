      -name: Run Discovery and Save Artifact
        env:
          API_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: |
          mkdir -p output
          
          # Replace 'api.oddspapi.com' with the actual hostname of the API you are calling
          # We use --resolve to map the domain to the IP, or you can use -H "Host: ..."
          curl -H "x-api-key: $API_KEY" \
               -H "Host: api.oddspapi.com" \
               "https://api.oddspapi.com/v4/sports" > output/sports.json
               
