name: OddsPapi Discovery
on: [workflow_dispatch]

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Run Discovery and Save Artifact
        env:
          API_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: |
          mkdir -p output
          
          # Use wget with --no-check-certificate to bypass strict SSL validation
          # and --header to pass your API key
          wget --no-check-certificate \
               --header="x-api-key: $API_KEY" \
               -O output/sports.json \
               "https://api.oddspapi.com/v4/sports"

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results
          path: output/
          
