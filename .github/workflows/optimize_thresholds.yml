name: Grade, Calibrate, and Optimize Tier Thresholds

# Runs the full grade -> calibrate -> re-threshold loop in one job:
#   1-3. Find every ungraded pick, determine its official result, write the
#        grade back to pick_history.jsonl        (core.historical_grader)
#   4.   Print the calibration summary (win%/ROI by market, confidence
#        bucket, edge bucket, tier)                (core.calibration)
#   5.   Search graded history for the best Nuke/Diamond/Gold thresholds
#        and write output/threshold_recommendations.json
#                                                    (core.threshold_optimizer)
# via run_grading_workflow.py, which just calls the three modules above in
# order and prints all of it to this job's log.
#   6.   Grade REJECTED picks from output/shadow_log.jsonl (candidates the
#        gatekeeper turned down but still scored an edge/confidence for),
#        writing output/shadow_log_graded.jsonl -- answers "would this
#        rejected pick have won?" for threshold review, using the same
#        grader dispatch/stat fetchers as step 1-3 so it can't disagree
#        with how a published pick would have been graded.
#                                                    (core.shadow_grader)
#
# This DOES commit new grades to pick_history.jsonl (steps 1-3 write back),
# but only ever adds actual_result/profit_units/etc. to existing rows or
# leaves them untouched -- it never invents or removes picks. Step 5's
# output/threshold_recommendations.json is a report for a human to review
# before manually editing core/decision_gatekeeper.py's
# SPORT_TIER_THRESHOLDS -- nothing here auto-applies a new threshold. Step
# 6's output/shadow_log_graded.jsonl is the same kind of report -- nothing
# reads it automatically either.
on:
  schedule:
    # 11:00 UTC daily -- after the 09:00 UTC grade-picks run in
    # generate_daily_picks.yml, so this sees that run's committed grades
    # too (and will pick up anything that job missed, since grading is
    # idempotent -- already-graded rows are just skipped).
    - cron: '0 11 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grade-calibrate-optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run grading + calibration + threshold search
        run: |
          python3 run_grading_workflow.py \
            --pick-history output/pick_history.jsonl \
            --reject-log output/grading_rejects.jsonl \
            --threshold-output output/threshold_recommendations.json

      - name: Grade rejected picks (shadow log)
        run: |
          python3 -m core.shadow_grader \
            --shadow-log output/shadow_log.jsonl \
            --output output/shadow_log_graded.jsonl

      - name: Upload grading rejects as artifact
        # grading_rejects.jsonl is gitignored (ephemeral debug info) --
        # this is the file to check for *why* a specific pick is still
        # ungraded (unparseable matchup, game not found, fetch failure,
        # unsupported market, etc).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grading-rejects-${{ github.run_id }}
          path: output/grading_rejects.jsonl
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload threshold recommendations as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threshold-recommendations-${{ github.run_id }}
          path: output/threshold_recommendations.json
          if-no-files-found: warn
          retention-days: 30

      - name: Upload graded shadow log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-log-graded-${{ github.run_id }}
          path: output/shadow_log_graded.jsonl
          if-no-files-found: warn
          retention-days: 30

      - name: Reconcile pick_history.jsonl with origin before committing
        # Same reconciliation as the grade-picks job in
        # generate_daily_picks.yml -- this job only ever adds grading
        # fields to existing rows or leaves rows untouched, so local
        # (this run's freshly graded version) safely wins per-row here.
        if: always()
        run: |
          git fetch origin main
          python3 - <<'PYEOF'
          import json, os, subprocess

          path = "output/pick_history.jsonl"
          local = []
          if os.path.exists(path):
              with open(path) as f:
                  local = [json.loads(l) for l in f if l.strip()]

          remote_raw = subprocess.run(
              ["git", "show", "origin/main:" + path],
              capture_output=True, text=True
          )
          remote = []
          if remote_raw.returncode == 0:
              remote = [json.loads(l) for l in remote_raw.stdout.splitlines() if l.strip()]

          def row_id(r):
              return r.get("pick_id") or r.get("bet_id") or r.get("id")

          by_id = {row_id(r): r for r in remote}
          by_id.update({row_id(r): r for r in local})
          merged = sorted(by_id.values(), key=lambda r: r.get("generated_at") or "")

          with open(path, "w") as f:
              for r in merged:
                  f.write(json.dumps(r) + "\n")

          print(f"pick_history.jsonl reconciled: {len(local)} local + {len(remote)} remote -> {len(merged)} merged rows")
          PYEOF

      - name: Commit graded pick_history.jsonl, threshold recommendations, and graded shadow log
        if: always()
        run: |
          git config user.name "threshold-optimizer-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -f output/pick_history.jsonl output/threshold_recommendations.json output/shadow_log_graded.jsonl
          git diff --quiet --cached || git commit -m "Grade + calibrate + threshold search + shadow grading $(date -u +%Y-%m-%d)"
          git merge -X ours origin/main --no-edit --allow-unrelated-histories
          git push
          
