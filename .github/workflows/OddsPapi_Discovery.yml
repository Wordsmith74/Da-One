name: OddsPapi Discovery
on: [workflow_dispatch]

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Run Discovery and Save Artifact
        env:
          API_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: |
          mkdir -p output
          
          # Using -H for Host and --tlsv1.2 to ensure a compatible handshake
          # We omit complex DNS resolution to prevent shell expansion errors
          curl -v -H "x-api-key: $API_KEY" \
               -H "Host: api.oddspapi.com" \
               --tlsv1.2 \
               "https://api.oddspapi.com/v4/sports" > output/sports.json

      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: discovery-results
          path: output/
          
