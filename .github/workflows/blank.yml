name: Generate Daily Picks

on:
  schedule:
    # Runs at 10:00 UTC daily (~6am ET / 3am PT) -- adjust to whenever you want
    # the slate refreshed. Cron is always UTC regardless of your local timezone.
    - cron: '0 10 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas lxml pybaseball

      - name: Clear Python cache
        run: find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

      - name: Run pipeline
        env:
          BALL_DONT_LIE_KEY: ${{ secrets.BALL_DONT_LIE_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          PROP_LINE_API_KEY: ${{ secrets.PROP_LINE_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 run_pipeline.py

      - name: Upload run log as artifact (always, even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: output/run_log.json
          retention-days: 14
          if-no-files-found: warn

      - name: Commit updated picks.json and run_log.json
        if: always()
        run: |
          git config user.name "picks-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/picks.json output/player_id_cache.json output/pick_history.jsonl
          git diff --quiet --cached || git commit -m "Update picks $(date -u +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: generate-picks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (post-commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        
