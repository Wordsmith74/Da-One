<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Da One — Today's Picks</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --felt: #0b2e23;
    --felt-deep: #082019;
    --chalk: #eee7d8;
    --chalk-dim: #b9b09c;
    --amber: #e8a33d;
    --amber-dim: #9c7536;
    --line: rgba(238,231,216,0.14);
    --over: #6fae8c;
    --under: #c97b6a;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    background: radial-gradient(ellipse at top, var(--felt) 0%, var(--felt-deep) 70%);
    color: var(--chalk);
    font-family: 'JetBrains Mono', monospace;
    min-height:100vh;
    padding-bottom: 4rem;
  }

  header{
    padding: 2.5rem 1.5rem 1.75rem;
    border-bottom: 1px solid var(--line);
    text-align:center;
  }
  header .eyebrow{
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  header h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    letter-spacing: 0.02em;
    margin: 0;
    text-transform: uppercase;
  }
  header .sub{
    color: var(--chalk-dim);
    font-size: 0.8rem;
    margin-top: 0.6rem;
  }

  #status{
    text-align:center;
    padding: 3rem 1.5rem;
    color: var(--chalk-dim);
  }
  #status.error{ color: var(--under); }

  main{
    max-width: 720px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .slip{
    position: relative;
    background: rgba(238,231,216,0.04);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.1rem 1.25rem 1.1rem 1.4rem;
    overflow: hidden;
  }
  .slip::before{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width: 5px;
    background: var(--amber);
  }

  .slip-top{
    display:flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.75rem;
    margin-bottom: 0.65rem;
  }
  .matchup{
    font-family:'Oswald', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    color: var(--chalk-dim);
    text-transform: uppercase;
  }
  .sport-tag{
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--felt-deep);
    background: var(--amber);
    padding: 0.15rem 0.5rem;
    border-radius: 2px;
    text-transform: uppercase;
    white-space: nowrap;
    font-weight: 700;
  }

  .pick-line{
    display:flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .pick-main{
    font-family:'Oswald', sans-serif;
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.25;
  }
  .pick-main .side-over{ color: var(--over); }
  .pick-main .side-under{ color: var(--under); }

  .odds{
    font-size: 1rem;
    color: var(--chalk-dim);
    white-space: nowrap;
  }

  .meta-row{
    display:flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.85rem;
    padding-top: 0.7rem;
    border-top: 1px dashed var(--line);
    font-size: 0.72rem;
    color: var(--chalk-dim);
  }
  .edge{
    color: var(--amber);
    font-weight: 700;
  }
  .conf{
    letter-spacing: 0.06em;
  }

  footer{
    text-align:center;
    padding: 2rem 1.5rem 0;
    color: var(--chalk-dim);
    font-size: 0.7rem;
    letter-spacing: 0.04em;
  }
  footer a{ color: var(--amber); text-decoration:none; }

  @media (prefers-reduced-motion: no-preference){
    .slip{ animation: rise 0.4s ease backwards; }
  }
  @keyframes rise{
    from{ opacity:0; transform: translateY(6px); }
    to{ opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Da One · Daily Slate</div>
  <h1>Today's Picks</h1>
  <div class="sub" id="generated-at">Loading…</div>
</header>

<div id="status">Fetching today's slate…</div>
<main id="picks"></main>

<footer>
  Stats from balldontlie · ESPN · stats.wnba.com fallback chain &middot;
  raw data: <a href="picks.json">picks.json</a>
</footer>

<script>
async function loadPicks(){
  const statusEl = document.getElementById('status');
  const mainEl = document.getElementById('picks');
  const genEl = document.getElementById('generated-at');

  try{
    const res = await fetch('picks.json', { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const picks = data.picks || [];

    if(data.generated_at){
      const d = new Date(data.generated_at);
      genEl.textContent = 'Generated ' + d.toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
      });
    } else {
      genEl.textContent = '';
    }

    if(picks.length === 0){
      statusEl.textContent = 'No picks cleared the edge threshold today. Check back tomorrow.';
      return;
    }

    statusEl.remove();

    picks.forEach((p, i) => {
      const sideClass = (p.side || '').toLowerCase() === 'over' ? 'side-over' : 'side-under';
      const card = document.createElement('div');
      card.className = 'slip';
      card.style.animationDelay = (i * 0.05) + 's';
      card.innerHTML = `
        <div class="slip-top">
          <span class="matchup">${escapeHtml(p.matchup || '')}</span>
          <span class="sport-tag">${escapeHtml(p.market || p.sport || '')}</span>
        </div>
        <div class="pick-line">
          <span class="pick-main"><span class="${sideClass}">${escapeHtml(p.pick || '')}</span></span>
          <span class="odds">${escapeHtml(p.line || '')}</span>
        </div>
        <div class="meta-row">
          <span class="edge">${p.edge_pct != null ? p.edge_pct + '% edge' : ''}</span>
          <span class="conf">${p.confidence != null ? 'confidence ' + p.confidence : ''}</span>
        </div>
      `;
      mainEl.appendChild(card);
    });

  } catch(err){
    statusEl.className = 'error';
    statusEl.textContent = "Couldn't load picks.json (" + err.message + "). The site may still be deploying — try refreshing in a minute.";
  }
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

loadPicks();
</script>

</body>
</html>
