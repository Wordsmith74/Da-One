<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F14;
    --card:#141B22;
    --card-edge:#1D2730;
    --ink:#E8E2D4;
    --muted:#7E8A99;
    --green:#5FD4A0;
    --red:#E0665C;
    --line:#26313C;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding-bottom:60px;
  }
  header{
    padding:28px 20px 18px;
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--muted);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{
    font-family:'Teko',sans-serif;
    font-weight:600;
    font-size:44px;
    line-height:1;
    margin:0;
    letter-spacing:0.5px;
  }
  .sub{
    color:var(--muted);
    font-size:13px;
    margin-top:6px;
  }
  main{ padding:18px 16px 0; max-width:480px; margin:0 auto; }
  .group-label{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
    margin:22px 4px 10px;
  }
  .ticket{
    position:relative;
    background:var(--card);
    border-radius:14px;
    margin-bottom:18px;
    overflow:hidden;
    border:1px solid var(--card-edge);
  }
  .ticket-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding:16px 18px 14px;
  }
  .matchup{
    font-size:12px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    margin-bottom:4px;
  }
  .pick-name{
    font-family:'Teko',sans-serif;
    font-weight:600;
    font-size:28px;
    line-height:1.1;
  }
  .market-tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--bg);
    background:var(--ink);
    padding:4px 8px;
    border-radius:5px;
    white-space:nowrap;
  }
  .perf{
    position:relative;
    height:1px;
    margin:0 0;
    border-top:1px dashed var(--line);
  }
  .perf::before,.perf::after{
    content:"";
    position:absolute;
    top:-7px;
    width:14px;
    height:14px;
    background:var(--bg);
    border-radius:50%;
  }
  .perf::before{ left:-7px; }
  .perf::after{ right:-7px; }
  .ticket-bottom{
    display:flex;
    padding:14px 18px 18px;
    gap:10px;
  }
  .stat{ flex:1; }
  .stat-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:3px;
  }
  .stat-value{
    font-family:'JetBrains Mono',monospace;
    font-size:15px;
    font-weight:500;
  }
  .edge-pos{ color:var(--green); }
  .edge-neg{ color:var(--red); }
  .conf-bar{
    height:4px;
    background:var(--line);
    border-radius:2px;
    margin-top:6px;
    overflow:hidden;
  }
  .conf-fill{
    height:100%;
    background:var(--green);
    border-radius:2px;
  }
  footer{
    text-align:center;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:1px;
    padding:30px 20px 10px;
  }
  .empty{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Private &middot; Friends Only</div>
  <h1>The Slate</h1>
  <div class="sub" id="dateLine">Loading today's board&hellip;</div>
</header>

<main id="main">
  <div class="empty">Loading picks&hellip;</div>
</main>

<footer>BUILT FOR ENTERTAINMENT &middot; BET RESPONSIBLY &middot; NO GUARANTEES</footer>

<script>
// In production this fetches picks.json generated by the model.
// Mock data shown here so the layout can be reviewed before the data layer is wired in.
const MOCK_PICKS = {
  "generated_at": "2026-06-21T14:30:00Z",
  "picks": [
    {
      "sport": "MLB F5",
      "market": "F5 Total",
      "matchup": "NYY @ BOS",
      "pick": "Under 5.5",
      "line": "5.5 (-110)",
      "model_number": "4.7",
      "edge_pct": 8.2,
      "confidence": 72
    },
    {
      "sport": "MLB F5",
      "market": "F5 Team Total",
      "matchup": "LAD @ SD",
      "pick": "LAD Over 2.5",
      "line": "2.5 (-115)",
      "model_number": "3.1",
      "edge_pct": 11.4,
      "confidence": 78
    },
    {
      "sport": "MLB Ks",
      "market": "Pitcher Strikeouts",
      "matchup": "HOU @ SEA",
      "pick": "Framber Valdez Over 5.5",
      "line": "5.5 (-120)",
      "model_number": "6.8",
      "edge_pct": 6.5,
      "confidence": 64
    },
    {
      "sport": "WNBA",
      "market": "Player Points",
      "matchup": "NY Liberty @ LV Aces",
      "pick": "A'ja Wilson Over 21.5",
      "line": "21.5 (-110)",
      "model_number": "24.2",
      "edge_pct": 5.9,
      "confidence": 61
    },
    {
      "sport": "WNBA",
      "market": "Player Assists",
      "matchup": "CHI Sky @ MIN Lynx",
      "pick": "Courtney Williams Under 5.5",
      "line": "5.5 (-105)",
      "model_number": "4.3",
      "edge_pct": -2.1,
      "confidence": 38
    }
  ]
};

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
}

// Real picks.json stores the line and the American odds as two separate
// fields (pick_time_line / pick_time_odds, current_line / current_odds) --
// unlike MOCK_PICKS above, which hand-writes them together into one
// "5.5 (-110)" string for layout preview purposes. This card was only ever
// reading p.line, so on real data (bare number, no odds attached) the odds
// never showed up at all. Prefer current_odds (kept fresh by the line-
// movement check) and fall back to pick_time_odds; if neither is present
// (e.g. MOCK_PICKS, which already bakes odds into p.line) render nothing
// extra so the line isn't shown twice.
function fmtOdds(p){
  const o = p.current_odds ?? p.pick_time_odds;
  if(o === undefined || o === null || o === '') return '';
  const n = Number(o);
  if(Number.isNaN(n)) return '';
  return ` (${n > 0 ? '+' + n : n})`;
}

function render(data){
  document.getElementById('dateLine').textContent = "Board generated " + fmtTime(data.generated_at);
  const main = document.getElementById('main');
  if(!data.picks || data.picks.length === 0){
    main.innerHTML = '<div class="empty">No picks clear the edge threshold today. Check back tomorrow.</div>';
    return;
  }

  const groups = {};
  data.picks.forEach(p => {
    if(!groups[p.sport]) groups[p.sport] = [];
    groups[p.sport].push(p);
  });

  let html = '';
  Object.keys(groups).forEach(sport => {
    html += `<div class="group-label">${sport}</div>`;
    groups[sport].forEach(p => {
      const edgeClass = p.edge_pct >= 0 ? 'edge-pos' : 'edge-neg';
      const edgeSign = p.edge_pct >= 0 ? '+' : '';
      html += `
        <div class="ticket">
          <div class="ticket-top">
            <div>
              <div class="matchup">${p.matchup}</div>
              <div class="pick-name">${p.pick}</div>
            </div>
            <div class="market-tag">${p.market}</div>
          </div>
          <div class="perf"></div>
          <div class="ticket-bottom">
            <div class="stat">
              <div class="stat-label">Line</div>
              <div class="stat-value">${p.line}${fmtOdds(p)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Model</div>
              <div class="stat-value">${p.model_number}</div>
            </div>
            <div class="stat">
              <div class="stat-label">Edge</div>
              <div class="stat-value ${edgeClass}">${edgeSign}${p.edge_pct}%</div>
            </div>
            <div class="stat">
              <div class="stat-label">Confidence</div>
              <div class="stat-value">${p.confidence}%</div>
              <div class="conf-bar"><div class="conf-fill" style="width:${p.confidence}%"></div></div>
            </div>
          </div>
        </div>`;
    });
  });
  main.innerHTML = html;
}

// Attempt to load real picks.json; fall back to mock data if not present (e.g. local preview).
fetch('picks.json')
  .then(r => { if(!r.ok) throw new Error('no picks.json yet'); return r.json(); })
  .then(render)
  .catch(() => render(MOCK_PICKS));
</script>

</body>
</html>
